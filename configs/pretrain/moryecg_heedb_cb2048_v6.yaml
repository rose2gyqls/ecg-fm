# ── MoRyECG v6 Pre-training — codebook=1024 (frozen v4 tokenizer) ──────────
#
# v6 changes vs v5 (informed by v4↔v5 finetune gap analysis):
#
# Architecture (Tier 3 G):
#   - + GlobalRefineBlock at the end of the factorized stack: one full
#     self-attention over [g, H_flat] (length 1+N·L=361) restores arbitrary
#     token-to-token attention paths that intra/inter-beat factorization
#     severed. Targets the −1.1pp attention_probe regression seen in v5.
#
# Loss (Tier 1 A):
#   - rhythm_weight  0 → 1.0
#   - fiducial_weight 0 → 1.0
#   v5 disabled both expecting the RR-aware bias to absorb temporal signal,
#   but bias is attention modulation, not direct supervision. Re-enabling
#   restores the v4 multi-task signal that the architecture change should
#   COMPLEMENT (not replace).
#
# STFT pathway (Tier 1 B):
#   - stft_channels [8,16,32] → [16,32,64]  (capacity restored to v4 level)
#   - stft_dropout   0.1 → 0.0              (drop the dropout)
#   The beat-aligned STFT-time mask (in train_v6) is the actual leakage
#   gate; capacity reduction only weakened the spectral pathway without
#   adding leakage protection.
#
# RR bias init (Tier 1 C):
#   - rr_bias.init_zero true → false. v5's init_zero left the bias as
#     no-op for the first ~5 epochs. Random init lets the rhythm bias
#     contribute attention modulation from step 1.
#
# Data scaling (Tier 2 D):
#   - train_list:  train_files.txt (190k) → train_files_1m.txt (1.0M)
#     Closer to Chinchilla compute-optimal for a 76M-param model
#     (1B+ tokens with N·L = 360 tokens/record).
#
# Training schedule (Tier 2 E + Tier 4 K):
#   - early_stop_patience 10 → 30  (v4/v5 stopped at ep15-20, likely too early)
#   - mask_warmup_epochs 50 → 25   (faster ramp; data is 5× larger so noisier
#     initial epochs aren't a stability concern any more)
#
# Contrastive (Tier 4 I):
#   - weight 0.3 → 0.5             (push patient discrimination harder)
#   - temperature 0.1 → 0.07       (sharper softmax → more aggressive separation)
#
# (Tier 4 J — layer-wise LR decay — applies to the finetune side; the
#  benchmark adapter exposes early/late param groups. v6 puts the
#  GlobalRefineBlock in the "late" group so finetune can apply a higher LR
#  to the global refinement layer specifically.)

data:
  source: heedb
  train_list: /home/irteam/local-node-d/hbkimi/ecg-fm/file_lists/train_files_1m.txt
  val_list:   /home/irteam/local-node-d/hbkimi/ecg-fm/file_lists/val_files.txt
  target_fs: 500
  beat_length: 256
  before_ms: 200
  after_ms: 400
  normalize: record_mad
  record_mad_scale: 5.0
  n_leads: 12
  max_beats_per_lead: 30
  stft_n_fft: 256
  stft_hop: 64
  seed: 42
  fiducial:
    q_window_ms: 50
    s_window_ms: 80

  normalization:
    rr_mean:  [0.85, 0.85, 0.85]
    rr_std:   [0.20, 0.20, 0.15]
    fid_mean: [0.030, 0.040]
    fid_std:  [0.015, 0.020]

tokenizer:
  ckpt: checkpoints/tokenizer_heedb_full_cb2048_v4/best.pt
  codebook_size: 2048
  latent_dim: 256

model:
  arch: moryecg_v6                     # ★ v6 routing key
  d_model: 512
  nhead: 8
  num_layers: 12
  dim_feedforward: 2048
  dropout: 0.1
  ffn_g_share: false
  glob_aggregation: mean
  context:
    rhythm_input_dim: 3
    rhythm_hidden: 256
    stft_channels: [16, 32, 64]        # ★ B: restored capacity
    stft_dropout: 0.0                  # ★ B: dropout off
    rr_bias:
      enabled: true
      hidden: 64
      init_zero: false                 # ★ C: random init → bias active from step 1
  global_refine:                       # ★ G: final full-attention block
    enabled: true
    # dim_feedforward / dropout default to model.dim_feedforward / dropout

masking:
  mask_strategy: span
  span_length: 3
  beat_mask_ratio: 0.5
  rhythm_mask_ratio: 0.5
  mask_warmup_epochs: 25               # ★ K: 50 → 25 faster ramp
  mask_warmup_schedule: linear
  mask_start_ratio: 0.15
  lead_dropout_prob: 0.15
  lead_dropout_schedule: linear
  lead_dropout_warmup_epochs: 25       # ★ K: matched
  lead_dropout_min_leads: 10

training:
  batch_size: 64
  lr: 3e-4
  weight_decay: 1e-4
  max_epochs: 200
  warmup_epochs: 20
  grad_clip: 1.0
  num_workers: 18
  prefetch_factor: 8

  amp:
    enabled: true
    dtype: bfloat16

  ddp_find_unused_model: false
  ddp_find_unused_head:  false

  early_stop_metric: val_acc_nontop
  early_stop_patience: 30              # ★ E: 10 → 30

  loss:
    morphology_weight: 1.0
    rhythm_weight:    1.0              # ★ A: 0 → 1 (v4-equivalent)
    fiducial_weight:  1.0              # ★ A: 0 → 1 (v4-equivalent)
    class_balanced_alpha: 0.5

  contrastive:
    weight:        0.5                 # ★ I: 0.3 → 0.5
    temperature:   0.07                # ★ I: 0.1 → 0.07 (sharper)
    proj_hidden:   512
    proj_out:      128
    warmup_epochs: 5

  log_dir:  logs/pretrain_heedb_cb2048_v6
  tb_dir:   logs/tb/pretrain/cb2048_v6
  ckpt_dir: checkpoints/pretrain_heedb_cb2048_v6
  save_every: 10
  eval_every: 5
