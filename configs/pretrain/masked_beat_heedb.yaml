# ── Pre-training (Masked Beat Modeling, HEEDB 직접 입력) ──────────────────
data:
  source: heedb
  # Phase 1과 동일한 200K subset 재사용 (train/val 누수 방지)
  train_list: /home/irteam/local-node-d/hbkimi/ecg-fm/file_lists/train_files.txt
  val_list:   /home/irteam/local-node-d/hbkimi/ecg-fm/file_lists/val_files.txt
  target_fs: 500
  beat_length: 256
  before_ms: 200
  after_ms: 400
  n_leads: 12
  max_beats_per_lead: 15
  stft_n_fft: 256
  stft_hop: 64
  seed: 42

tokenizer:
  ckpt: checkpoints/tokenizer_heedb/best.pt
  codebook_size: 512
  latent_dim: 256
  # model_cfg_yaml: configs/tokenizer/vqvae_heedb.yaml  # ckpt에 model_cfg 없을 때

model:
  d_model: 256
  nhead: 8
  num_layers: 8
  dim_feedforward: 1024
  dropout: 0.1
  max_seq_len: 192
  context:
    rhythm_input_dim: 3
    rhythm_hidden: 128
    global_context_dim: 256
    stft_channels: [16, 32, 64]

masking:
  beat_mask_ratio: 0.15
  rhythm_mask_ratio: 0.15
  lead_dropout_prob: 0.2
  lead_dropout_min_leads: 1

training:
  # batch_size: per-GPU 기준. 7-GPU DDP시 effective batch = 128 * 7 = 896
  batch_size: 128
  # linear scaling rule: 단일 GPU lr 1e-4 → 7-GPU에서 ~7e-4 권장.
  #  보수적으로 sqrt(7)*1e-4 ≈ 2.6e-4 부터 시작해도 OK
  lr: 5e-4
  weight_decay: 1e-4
  max_epochs: 100
  warmup_epochs: 20
  grad_clip: 1.0
  # 7-GPU 환경: 7 * 8 = 56 worker. OMP_NUM_THREADS=4로 thread 폭발 억제.
  # CPU 코어 수 적으면 6으로 낮출 것
  num_workers: 8
  loss:
    morphology_weight: 1.0
    rhythm_weight: 0.5
  log_dir: logs/pretrain_heedb
  ckpt_dir: checkpoints/pretrain_heedb
  save_every: 10
  eval_every: 5
