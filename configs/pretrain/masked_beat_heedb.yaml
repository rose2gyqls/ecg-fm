# ── Pre-training (Masked Beat Modeling, HEEDB 직접 입력) ──────────────────
data:
  source: heedb
  data_dir: /home/irteam/ddn-opendata1/h5/heedb/v4.0
  target_fs: 500
  beat_length: 256
  before_ms: 200
  after_ms: 400
  n_leads: 12
  max_beats_per_lead: 15
  stft_n_fft: 256
  stft_hop: 64
  train_ratio: 0.95
  seed: 42

tokenizer:
  ckpt: checkpoints/tokenizer_heedb/best.pt
  codebook_size: 512
  latent_dim: 256
  # model_cfg_yaml: configs/tokenizer/vqvae_heedb.yaml  # ckpt에 model_cfg 없을 때

model:
  d_model: 256
  nhead: 8
  num_layers: 8
  dim_feedforward: 1024
  dropout: 0.1
  max_seq_len: 192
  context:
    rhythm_input_dim: 3
    rhythm_hidden: 128
    global_context_dim: 256
    stft_channels: [16, 32, 64]

masking:
  beat_mask_ratio: 0.15
  rhythm_mask_ratio: 0.15
  lead_dropout_prob: 0.2
  lead_dropout_min_leads: 1

training:
  batch_size: 128
  lr: 1e-4
  weight_decay: 1e-4
  max_epochs: 300
  warmup_epochs: 20
  grad_clip: 1.0
  num_workers: 8
  loss:
    morphology_weight: 1.0
    rhythm_weight: 0.5
  log_dir: logs/pretrain_heedb
  ckpt_dir: checkpoints/pretrain_heedb
  save_every: 10
  eval_every: 5
