# ── ECG Foundation Model Pre-training (Masked Beat Modeling) ───────────────
data:
  data_dir: /path/to/ecg_data
  beat_length: 256
  fs: 500
  n_leads: 12
  max_beats_per_lead: 15               # 10초 ECG 기준 최대 비트 수
  stft_n_fft: 256
  stft_hop: 64
  train_ratio: 0.95

tokenizer:
  ckpt: checkpoints/tokenizer/best.pt  # frozen VQ-VAE checkpoint
  codebook_size: 512
  latent_dim: 256

model:
  d_model: 256                         # Transformer hidden dim
  nhead: 8
  num_layers: 8
  dim_feedforward: 1024
  dropout: 0.1
  max_seq_len: 192                     # 15 beats x 12 leads + 1 CLS = ~181

  # Context injection
  context:
    rhythm_input_dim: 3                # [prev_rr, next_rr, median_rr]
    rhythm_hidden: 128
    global_context_dim: 256            # 2D CNN output dim
    stft_channels: [16, 32, 64]

masking:
  beat_mask_ratio: 0.15                # 전체 비트 토큰 중 마스킹 비율
  rhythm_mask_ratio: 0.15
  lead_dropout_prob: 0.2               # 리드 단위 dropout 확률
  lead_dropout_min_leads: 1            # 최소 보존 리드 수

training:
  batch_size: 128
  lr: 1e-4
  weight_decay: 1e-4
  max_epochs: 300
  warmup_epochs: 20
  grad_clip: 1.0
  num_workers: 8

  loss:
    morphology_weight: 1.0             # masked token CE loss
    rhythm_weight: 0.5                 # masked RR MSE loss

  log_dir: logs/pretrain
  ckpt_dir: checkpoints/pretrain
  save_every: 10
  eval_every: 5
