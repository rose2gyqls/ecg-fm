# ── Pre-training v2 (Masked Beat Modeling, HEEDB) — codebook=2048 ───────────
#
# v2 변경사항 (vs v1):
#   B-1) RR / fiducial target z-score 정규화 (RhythmMLP에 norm_mean/std 버퍼 + MSE 직전 target normalize)
#   B-2) beat_mask_ratio 0.15 → 0.5,  span_length 1 → 3 (인접 beat 묶음)
#   B-3) i.i.d. 마스킹 → span 마스킹 (lead-redundancy 문제는 C에서 stair-step으로 별도 처리 예정)
#   B-4) lead_dropout 0 → 0.2 linear curriculum over 50 epochs (warmup 후 0.2 고정)
#   B-5) d_model 256 → 512, dim_feedforward 1024 → 2048, rhythm_hidden 128 → 256
#   B-6) max_beats_per_lead 15 → 30 (rhythm context 30초로 확장)
#   추가) early_stop_patience 10 (eval_every=5 → 50ep 비개선 시 중단)
#         tokenizer는 v2(cosine VQ)를 사용
#         batch_size 128 → 32 per GPU (model + sequence 4x 메모리 보상)
#
# tokenizer 의존성: checkpoints/tokenizer_heedb_full_cb2048_v2/best.pt 있어야 함.

data:
  source: heedb
  train_list: /home/irteam/local-node-d/hbkimi/ecg-fm/file_lists/train_files.txt
  val_list:   /home/irteam/local-node-d/hbkimi/ecg-fm/file_lists/val_files.txt
  target_fs: 500
  beat_length: 256
  before_ms: 200
  after_ms: 400
  n_leads: 12
  max_beats_per_lead: 30                # ★ v2: 15 → 30
  stft_n_fft: 256
  stft_hop: 64
  seed: 42
  fiducial:
    q_window_ms: 50
    s_window_ms: 80

  # ★ B-1: RR / fiducial target 정규화 통계 (clinical priors).
  #   - 측정 단위: 초 (RR), 초 (Q-R, R-S 간격).
  #   - HEEDB는 소아/성인 혼합이라 RR std를 0.20~0.25로 넉넉히 잡음.
  #   - downstream encoder가 같은 통계를 자동 사용하도록 RhythmMLP buffer로 저장됨.
  normalization:
    rr_mean:  [0.85, 0.85, 0.85]        # prev_rr, next_rr, median_rr
    rr_std:   [0.20, 0.20, 0.15]
    fid_mean: [0.030, 0.040]            # qr_sec, rs_sec
    fid_std:  [0.015, 0.020]

tokenizer:
  ckpt: checkpoints/tokenizer_heedb_full_cb2048_v2/best.pt
  codebook_size: 2048
  latent_dim: 256

model:
  d_model: 512                          # ★ v2: 256 → 512
  nhead: 8
  num_layers: 8
  dim_feedforward: 2048                 # ★ v2: 1024 → 2048 (4× d_model)
  dropout: 0.1
  max_seq_len: 384                      # 1 + 30 × 12 = 361 → 여유 두고 384
  context:
    rhythm_input_dim: 3
    rhythm_hidden: 256                  # ★ v2: 128 → 256 (d_model에 맞춰 확장)
    global_context_dim: 512
    stft_channels: [16, 32, 64]

masking:
  # ★ B-2: span 마스킹 (인접 3 beat 묶음), 비율 0.5
  mask_strategy: span                   # span | iid
  span_length: 3
  beat_mask_ratio: 0.5                  # ★ v2: 0.15 → 0.5
  rhythm_mask_ratio: 0.5                # 동일 strategy로 따라감

  # ★ B-4: linear curriculum 0 → 0.2 over 50 epochs
  lead_dropout_prob: 0.4                # ★ leak-fix: 0.2 → 0.4 (per-lead Bernoulli)
  lead_dropout_schedule: linear         # constant | linear | cosine
  lead_dropout_warmup_epochs: 50
  lead_dropout_min_leads: 6             # ★ leak-fix: 1 → 6 (always keep ≥6 leads)

training:
  batch_size: 32                        # ★ v2: 128 → 32 (d=512 + S=361 메모리 보상)
  lr: 3e-4                              # ★ v2: 5e-4 → 3e-4 (큰 모델은 약간 보수적)
  weight_decay: 1e-4
  max_epochs: 200
  warmup_epochs: 20
  grad_clip: 1.0
  num_workers: 12
  prefetch_factor: 8

  early_stop_patience: 10               # ★ v2: eval_every=5 → 50 epoch 비개선

  loss:
    morphology_weight: 1.0
    rhythm_weight: 1.0                  # ★ v2: 0.5 → 1.0 (target z-score라 더 키워도 안전)
    fiducial_weight: 1.0                # ★ v2: 5.0 → 1.0 (target z-score 했으므로 dominant 지양)

  log_dir:  logs/pretrain_heedb_cb2048_v2
  tb_dir:   logs/tb/pretrain/cb2048_v2
  ckpt_dir: checkpoints/pretrain_heedb_cb2048_v2
  save_every: 10
  eval_every: 5
