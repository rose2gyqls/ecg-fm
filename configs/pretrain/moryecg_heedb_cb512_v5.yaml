# ── MoRyECG Pre-training v5 — codebook=1024 (frozen v4 tokenizer) ──────────
#
# v5 변경사항 (vs v4):
#   - Architecture: flat-seq Transformer → MoRyECG (intra-beat cross-lead +
#     inter-beat rhythm with STFT-conditioned [GLOB], shared RR-aware bias)
#   - Tokens stay 4D: H ∈ R^{B×N×L×D}; [GLOB] is a separate g ∈ R^{B×D}
#   - STFT leakage 차단:
#       (a) lead-dropout zeroes dropped-lead STFT channels (v4와 동일)
#       (b) NEW v5: beat-aligned STFT-time bin zero — masked beat의 raw
#           sample window를 덮는 모든 STFT frame을 0으로. Dataset이
#           beat_t_starts/beat_t_ends를 emit해서 train loop가 사용.
#   - Slim STFT encoder ([8, 16, 32]) — capacity 축소로 [GLOB]이 직접
#     morphology를 외우지 못하도록.
#   - Pairwise RR bias (init_zero) — inter-beat rhythm attention에 한해
#     적용. 모든 block 공유, head별 다른 slope.
#   - Loss: MLM + Contrastive (RR/Fid head는 코드 유지하되 weight=0)
#   - Tokenizer는 v4 그대로 사용 (cb512_v4/best.pt).
#
# Hyperparam은 v4와 동일하게 두어 토크나이저↔transformer 효과를 분리.

data:
  source: heedb
  train_list: /home/irteam/local-node-d/hbkimi/ecg-fm/file_lists/train_files.txt
  val_list:   /home/irteam/local-node-d/hbkimi/ecg-fm/file_lists/val_files.txt
  target_fs: 500
  beat_length: 256
  before_ms: 200
  after_ms: 400
  normalize: record_mad
  record_mad_scale: 5.0
  n_leads: 12
  max_beats_per_lead: 30
  stft_n_fft: 256
  stft_hop: 64
  seed: 42
  fiducial:
    q_window_ms: 50
    s_window_ms: 80

  normalization:
    rr_mean:  [0.85, 0.85, 0.85]
    rr_std:   [0.20, 0.20, 0.15]
    fid_mean: [0.030, 0.040]
    fid_std:  [0.015, 0.020]

tokenizer:
  ckpt: checkpoints/tokenizer_heedb_full_cb512_v4/best.pt
  codebook_size: 512
  latent_dim: 256

model:
  arch: moryecg                        # ★ v5: adapter routing key
  d_model: 512
  nhead: 8
  num_layers: 12
  dim_feedforward: 2048
  dropout: 0.1
  ffn_g_share: false                   # FFN_g 별도 (default)
  glob_aggregation: mean
  context:
    rhythm_input_dim: 3
    rhythm_hidden: 256
    stft_channels: [8, 16, 32]         # ★ slim STFT encoder
    stft_dropout: 0.1                  # ★ extra leakage gate
    rr_bias:
      enabled: true
      hidden: 64
      init_zero: true                  # bias=0 at init → vanilla MHA prior

masking:
  mask_strategy: span
  span_length: 3
  beat_mask_ratio: 0.5
  rhythm_mask_ratio: 0.5
  mask_warmup_epochs: 50
  mask_warmup_schedule: linear
  mask_start_ratio: 0.15
  lead_dropout_prob: 0.15
  lead_dropout_schedule: linear
  lead_dropout_warmup_epochs: 50
  lead_dropout_min_leads: 10

training:
  # ── Throughput on 7× H200 ──
  # bf16 AMP + larger per-GPU batch (H200 has 144 GB; v5 model ~75M params
  # × 2 views fits comfortably). Effective global batch = 64 × 7 × 2views = 896.
  batch_size: 64
  lr: 3e-4
  weight_decay: 1e-4
  max_epochs: 200
  warmup_epochs: 20
  grad_clip: 1.0
  # 128 CPUs / 7 ranks ≈ 18 workers/rank — same as v4, well within capacity.
  num_workers: 18
  prefetch_factor: 8

  amp:
    enabled: true
    dtype: bfloat16

  # MoRyECG forward exercises every parameter every step → DDP can skip the
  # find_unused scan on both the model and the heads (apply_masking
  # guarantees ≥1 mask span per record so even mlm_head is always called).
  ddp_find_unused_model: false
  ddp_find_unused_head:  false

  early_stop_metric: val_acc_nontop
  early_stop_patience: 10

  loss:
    morphology_weight: 1.0
    rhythm_weight: 0.0                 # ★ v5 default OFF (코드 유지)
    fiducial_weight: 0.0               # ★ v5 default OFF (코드 유지)
    class_balanced_alpha: 0.5

  contrastive:
    weight: 0.3
    temperature: 0.1
    proj_hidden: 512
    proj_out: 128
    warmup_epochs: 5

  log_dir:  logs/pretrain_heedb_cb512_v5
  tb_dir:   logs/tb/pretrain/cb512_v5
  ckpt_dir: checkpoints/pretrain_heedb_cb512_v5
  save_every: 10
  eval_every: 5
