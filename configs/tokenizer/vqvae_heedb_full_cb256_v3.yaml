# ── VQ-VAE Beat Tokenizer v3 — 전체 HEEDB + codebook=1024 ────────────────────
#
# v3 변경사항 (vs v2):
#   1) data.normalize: zscore → record_mad
#      - per-beat per-lead z-score는 V1↔V6 amplitude 차이를 모두 정규화로
#        지워버림 → codebook이 V1~V6 구분 못 함 (v2 진단 결과)
#      - record-level (median, p75|sig − median|)·5 scaling으로 교체
#      - lead-agnostic 원칙은 그대로: encoder는 단일 lead 입력만 받음
#   2) ckpt_dir/log_dir에 _v3 접미어 — v1/v2와 격리
#
# 그 외 architecture는 v2와 동일 (cosine VQ, l2-normalize encoder, K-means init,
# dead-code restart, multi-scale STFT loss).
data:
  source: heedb
  train_list: /home/irteam/local-node-d/hbkimi/ecg-fm/file_lists/train_files_full.txt
  val_list:   /home/irteam/local-node-d/hbkimi/ecg-fm/file_lists/val_files_full.txt
  target_fs: 500
  beat_length: 256
  before_ms: 200
  after_ms: 400
  normalize: record_mad                   # ★ v3: zscore → record_mad
  record_mad_scale: 5.0
  max_beats_per_record: 10
  cache: false
  n_leads: 12
  seed: 42

  virtual_len:
    train: 50_000_000
    val:    1_200_000

  rpeak_validation:
    local_max:         true
    local_max_window:  10
    local_max_shift:   8

  noise_filter:
    enabled: true
    ptp_min: 0.1                          # raw mV thresholds (applied BEFORE
    std_min: 0.01                         # record_mad → still in mV)

model:
  encoder:
    in_channels: 1
    channels: [32, 64, 128, 256]
    kernel_sizes: [7, 5, 3, 3]
    strides:   [2, 2, 2, 2]
    dropout: 0.1
    l2_normalize: true
  decoder:
    latent_dim: 256
    channels: [256, 128, 64, 32]
    kernel_sizes: [3, 3, 5, 7]
  codebook:
    num_embeddings: 256
    embedding_dim: 256
    commitment_cost: 0.1
    ema_decay: 0.99
    ema_update: true
    cosine: true
  latent_dim: 256

training:
  batch_size: 512
  lr: 3e-4
  weight_decay: 1e-4
  max_epochs: 100
  warmup_epochs: 10
  grad_clip: 1.0
  num_workers: 32
  prefetch_factor: 16

  kmeans_init:
    enabled: true
    n_samples: 50_000
    n_iter: 10

  early_stop_patience: 20

  loss:
    alpha: 1.0
    beta: 2.0
    gamma: 0.3
    use_gradient_loss: true
    fiducial_weight_map: false
    spec_n_ffts: [32, 64, 128]

    restart_dead_every: 500
    restart_dead_threshold: 1.0

  log_dir:  logs/tokenizer_heedb_full_cb256_v3
  tb_dir:   logs/tb/tokenizer/cb256_v3
  ckpt_dir: checkpoints/tokenizer_heedb_full_cb256_v3
  save_every: 10
  eval_every: 2
  monitor:
    codebook_usage: true
    perplexity: true
