# ── VQ-VAE Beat Tokenizer (HEEDB H5 직접 입력) ──────────────────────────────
data:
  source: heedb                          # heedb | npy
  # 200K random subset (11M → 190K train / 10K val)
  train_list: /home/irteam/local-node-d/hbkimi/ecg-fm/file_lists/train_files.txt
  val_list:   /home/irteam/local-node-d/hbkimi/ecg-fm/file_lists/val_files.txt
  target_fs: 500                          # 가변 fs → 공통 fs 로 리샘플
  beat_length: 256                        # 비트 리샘플 샘플 수
  before_ms: 200
  after_ms: 400
  normalize: zscore
  max_beats_per_record: 10                # 레코드당 무작위 비트 수 (streaming)
  cache: false
  n_leads: 12
  seed: 42

model:
  encoder:
    in_channels: 1
    channels: [32, 64, 128, 256]
    kernel_sizes: [7, 5, 3, 3]
    strides:   [2, 2, 2, 2]
    dropout: 0.1
  decoder:
    latent_dim: 256
    channels: [256, 128, 64, 32]
    kernel_sizes: [3, 3, 5, 7]
  codebook:
    num_embeddings: 512
    embedding_dim: 256
    commitment_cost: 0.25
    ema_decay: 0.99
    ema_update: true
  latent_dim: 256

training:
  batch_size: 512
  lr: 3e-4
  weight_decay: 1e-4
  max_epochs: 30
  warmup_epochs: 3
  grad_clip: 1.0
  num_workers: 16
  loss:
    alpha: 1.0
    beta: 0.5
    use_gradient_loss: true
    fiducial_weight_map: false
  log_dir: logs/tokenizer_heedb
  ckpt_dir: checkpoints/tokenizer_heedb
  save_every: 5
  eval_every: 2
  monitor:
    codebook_usage: true
    perplexity: true
