# ── VQ-VAE Beat Tokenizer ──────────────────────────────────────────────────
data:
  data_dir: /path/to/ecg_data          # wfdb / h5 / npy 루트 경로
  beat_length: 256                      # 리샘플 후 beat 샘플 수
  fs: 500                               # 원본 샘플링 주파수 (Hz)
  n_leads: 12
  train_ratio: 0.9

model:
  # Shared 1D-CNN Encoder
  encoder:
    in_channels: 1
    channels: [32, 64, 128, 256]
    kernel_sizes: [7, 5, 3, 3]
    strides:   [2, 2, 2, 2]            # 256 -> 16 frame
    dropout: 0.1

  # Decoder (mirror of encoder)
  decoder:
    latent_dim: 256
    channels: [256, 128, 64, 32]
    kernel_sizes: [3, 3, 5, 7]

  # VQ Codebook
  codebook:
    num_embeddings: 512                 # 코드북 크기 K
    embedding_dim: 256                  # latent 차원
    commitment_cost: 0.25
    ema_decay: 0.99                     # EMA codebook update decay
    ema_update: true

  latent_dim: 256

training:
  batch_size: 512
  lr: 3e-4
  weight_decay: 1e-4
  max_epochs: 200
  warmup_epochs: 10
  grad_clip: 1.0
  num_workers: 8

  # Loss weights  L = L_rec + alpha*L_vq + beta*L_fiducial
  loss:
    alpha: 1.0                          # VQ commitment loss weight
    beta: 0.5                           # fiducial loss weight
    use_gradient_loss: true             # gradient-based fiducial proxy
    fiducial_weight_map: false          # R-peak / P / T 구간 가중치 (옵션)

  # Logging / checkpoint
  log_dir: logs/tokenizer
  ckpt_dir: checkpoints/tokenizer
  save_every: 10
  eval_every: 5

  # Codebook 진단 지표
  monitor:
    codebook_usage: true
    perplexity: true
