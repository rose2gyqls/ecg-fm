name: ecg-fm
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - pytorch>=2.1
  - torchvision
  - pytorch-cuda=12.1

  - pip:
    - neurokit2>=0.2
    - wfdb>=4.1
    - scipy>=1.11
    - numpy>=1.24
    - PyYAML>=6.0
    - tqdm>=4.66
    - scikit-learn>=1.3
    - h5py>=3.9
